<script src="/js/vendor/fullcalendar-6.1.15.min.js"></script>

<div id="fullcalendar"></div>

<script id="rendered-js">
"use strict";

function strToDT(dt, add_days=0) {
  let d = new Date(Date.parse(dt));
  d.setDate(d.getDate() + add_days);
  return d;
}

function getMinMaxDate(fixedDate) {
    const today = new Date();
    const fixed = new Date(fixedDate);

    // Get the maximum (latest) date
    const maxDate = today > fixed ? today : fixed;

    // Format to YYYY-MM-DD
    return maxDate.toISOString().split('T')[0];
}

var events = [
    {
        daysOfWeek: [0, 6],
        display: "background", // v6 change: 'rendering' is now 'display'
        color: "#eee",
        overlap: false,        // fixed capitalization
        allDay: false
    },

    // >>>>>>>>>>>>>>>>>>>>>> FOR1
{{ range where  (sort .Site.Pages "LinkTitle") ".Params.tags" "in" "workshop" }}
    { 
      title: '{{ .Title }}',
      start: strToDT("{{ .Params.begin }} 2025 10:00:00"),  
      end: strToDT("{{ .Params.end }} 2025 23:00:00", 1),
      allDay: true,
      description: 'workshop',
      color: '#2F3C7E',
      url: "{{ .Permalink }}"
     },
{{ end }}
    // <<<<<<<<<<<<<<<<<<<<<< FOR1

    // >>>>>>>>>>>>>>>>>>>>>> FOR2
{{ range where  (sort .Site.Pages "LinkTitle") ".Params.tags" "in" "a_s_w" }}
    { 
      {{ if in .Params.speaker "**" }}
      title: '<strong>{{ .Params.calendar_speaker}}</strong>',
      {{ else }}
      title: '{{ .Params.speaker }}',
      {{ end }}
      start: strToDT("{{ .Params.begin }}"),  
      end: strToDT("{{ .Params.end }}", 0),
      allDay: false,
      description: '{{ .Title }}',
      color: '#2F3C7E',
      url: "{{ .Permalink }}"
     },
{{ end }}
];

// v6 change: Replace jQuery $(function() {}) with native DOMContentLoaded
document.addEventListener('DOMContentLoaded', function () {
    var calendarEl = document.getElementById("fullcalendar");
    
    var calendar = new FullCalendar.Calendar(calendarEl, {
        // v6 change: plugins array is no longer needed with index.global.min.js
        themeSystem: "standard",
        eventOrder: "start,title,-duration",
        
        // v6 change: 'header' is now 'headerToolbar'
        headerToolbar: {
            left: "prev,next today", 
            center: "title",
            right: 'dayGridMonth,listMonth'
        },
        
        // v6 changes: 'defaultDate' -> 'initialDate', 'defaultView' -> 'initialView'
        initialDate: getMinMaxDate("2025-04-01"),
        initialView: "dayGridMonth",
        firstDay: 1,
        
        // v6 change: 'eventLimit' is now 'dayMaxEvents'
        dayMaxEvents: false,
        displayEventEnd: true,
        
        // This combines your Hugo events array and the JSON generated from the CSV
        eventSources: [
            events,
            '/all_events.json'
        ],

         eventTimeFormat: {
            hour: '2-digit',
            minute: '2-digit',
            meridiem: false,
            hour12: false
          },
        droppable: true,
        editable: true, // Recommended in v6 to allow resizing/dragging
        eventDurationEditable: true,
        
        // v6 change: 'eventRender' is replaced by 'eventDidMount'
        eventDidMount: function (info) {
            if (info.view.type !== "listMonth") {
                
                // 1. Convert HTML tags in the title (like your <strong> tags)
                // v6 class changed from .fc-title to .fc-event-title
                let titleEl = info.el.querySelector('.fc-event-title');
                if (titleEl && titleEl.innerText.includes('<')) {
                    titleEl.innerHTML = titleEl.innerText;
                }

                // 2. Append the custom IssueKey link
                // v6 class changed from .fc-content to .fc-event-main
                let eventMain = info.el.querySelector(".fc-event-main");
                let eventID = info.event.extendedProps.issueKey;
                
                if (eventID && eventMain) {
                    let link = document.createElement("a");
                    link.innerHTML = eventID;
                    link.classList.add("float-right");
                    eventMain.appendChild(link);
                }
            }
        }
    });
    
    calendar.render();
});
//# sourceURL=pen.js
</script>
