<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }}</title>
    <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
    <link rel="icon" type="image/png" href="/favicon.ico">
    
    <style>
        @media (max-width: 768px) {
            /* 1. Stop mobile browsers from hijacking the first tap for "hover" */
            .dropdown:hover .dropdown-content {
                display: none !important; 
            }
            
            /* 2. Only show the menu when our JavaScript says so */
            .dropdown.mobile-open .dropdown-content {
                display: block !important;
                position: relative; /* Stacks nicely in the mobile menu */
                padding-left: 15px; /* Slight indent so it looks like a sub-menu */
            }
        }
    </style>
</head>
<body>

    <nav class="two-line-navbar" id="navbar">
      <div class="top-nav">
            <div class="home-link">
                <a href="/">
                    <img src="/images/logo.png" alt="Company Logo" class="brand-logo">
                    Home
                </a>
            </div>
            
            <button class="hamburger" id="hamburger-btn" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <ul class="nav-links">
                <li><a href="/location/">Location</a></li>
                <li class="dropdown">
                    <a href="/seminars/" class="dropbtn">Seminars ▾</a>
                    <div class="dropdown-content">
                        <a href="/seminars/">Upcoming Seminars</a>
                        <a href="/past-seminars/">Past Seminars</a>
                    </div>
                </li>

                <li class="dropdown">
                    <a href="/schools/" class="dropbtn">Schools ▾</a>
                    <div class="dropdown-content">
                        <a href="/school2026/">School 2026</a>
                    </div>
                </li>

                <li><a href="/calendar/">Calendar</a></li>
                <li><a href="/travel/">Travel</a></li>
            </ul>
        </div>
        
      {{ if in .RelPermalink "/schools" }}
        <div class="bottom-nav">
            <ul class="sub-nav-links">
                <li><a href="https://indico.gssi.it/event/956/">Register</a></li>
                <li><a href="#seo">Timetable</a></li>
            </ul>
        </div>
        {{ end }}
    </nav>

    <main style="padding: 40px;">
        {{ block "main" . }}{{ end }}
    </main>

    <script>
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const navbar = document.getElementById('navbar');

        // 1. Toggle the main mobile menu
        hamburgerBtn.addEventListener('click', () => {
            navbar.classList.toggle('active');
        });

        // 2. Handle dropdowns safely on touch screens
        const dropdowns = document.querySelectorAll('.dropdown');
        
        dropdowns.forEach(dropdown => {
            const dropbtn = dropdown.querySelector('.dropbtn');
            
            dropbtn.addEventListener('click', function(e) {
                if (window.innerWidth <= 768) { 
                    // If the dropdown is NOT open yet
                    if (!dropdown.classList.contains('mobile-open')) {
                        e.preventDefault(); // Stop the browser from following the link
                        
                        // Close any other open dropdowns for a clean UI
                        document.querySelectorAll('.dropdown').forEach(d => {
                            if (d !== dropdown) d.classList.remove('mobile-open');
                        });
                        
                        // Open this dropdown
                        dropdown.classList.add('mobile-open');
                    } 
                    // If it IS open, we do nothing to the event! 
                    // The browser will naturally follow the href link on this second tap.
                }
            });
        });
    </script>
</body>
</html>
